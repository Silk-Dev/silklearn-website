services:
  postgres:
    image: postgres:17-alpine
    container_name: silklearn-website-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: silklearn_website
      POSTGRES_USER: silklearn
      POSTGRES_PASSWORD: silklearn
    ports:
      - '5434:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U silklearn -d silklearn_website']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: